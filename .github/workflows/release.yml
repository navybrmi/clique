name: Create Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the bot commit that updates CHANGELOG.md to prevent infinite loops
    if: "!contains(github.event.head_commit.message, 'chore: update CHANGELOG')"
    permissions:
      contents: write  # Required to create releases, tags, and push CHANGELOG.md

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so we can read all existing tags
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create release and update changelog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          REPO: ${{ github.repository }}
        run: node scripts/generate-release.mjs

      - name: Commit and push changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: update CHANGELOG"
          git push
