name: "CodeQL"

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Mondays

jobs:
  check-files:
    name: Check changed files
    runs-on: ubuntu-latest
    outputs:
      non-md-changed: ${{ steps.check.outputs.non-md-changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect non-markdown changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }})
            if echo "$CHANGED" | grep -qv '\.md$'; then
              echo "non-md-changed=true" >> $GITHUB_OUTPUT
            else
              echo "non-md-changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "non-md-changed=true" >> $GITHUB_OUTPUT
          fi

  analyze:
    name: Analyze
    needs: check-files
    if: needs.check-files.outputs.non-md-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
