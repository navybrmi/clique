name: Generate Changelog

on:
  push:
    branches: [main]

jobs:
  changelog:
    runs-on: ubuntu-latest
    # Skip commits made by this workflow itself to prevent infinite loops
    if: "!contains(github.event.head_commit.message, 'chore: update CHANGELOG')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token with write access to push back to main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate changelog entry
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          REPO: ${{ github.repository }}
        run: node scripts/generate-changelog.mjs

      - name: Commit and push changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          # Only commit if CHANGELOG.md actually changed
          git diff --staged --quiet || git commit -m "chore: update CHANGELOG"
          git push
